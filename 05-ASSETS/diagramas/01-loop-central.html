<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>O Loop Central</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;400;600;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px; overflow: hidden;
    background: #0a0a08;
    font-family: 'Montserrat', sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .canvas { width: 1080px; height: 1080px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }

  /* título */
  .title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 38px; color: #f5f0e8; letter-spacing: -0.5px; margin-bottom: 6px; text-align: center; }
  .subtitle { font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 14px; color: #726a58; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 56px; text-align: center; }

  /* anel externo */
  .orbit {
    position: relative;
    width: 620px; height: 620px;
  }
  .orbit-ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 1px solid #1c1c18;
  }
  .orbit-ring-gold {
    position: absolute;
    inset: 24px;
    border-radius: 50%;
    border: 1px dashed rgba(212,175,55,0.2);
  }

  /* nó central */
  .center-node {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 130px; height: 130px;
    border-radius: 50%;
    background: #0e0e0c;
    border: 1px solid rgba(212,175,55,0.35);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
  }
  .center-node .icon { font-size: 28px; margin-bottom: 6px; }
  .center-node .label { font-size: 10px; font-weight: 600; color: #d4af37; letter-spacing: 1.5px; text-transform: uppercase; line-height: 1.4; }

  /* nós orbitais */
  .node {
    position: absolute;
    width: 110px; height: 110px;
    border-radius: 50%;
    background: #0e0e0c;
    border: 1px solid #1c1c18;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    padding: 12px;
    transform: translate(-50%, -50%);
    transition: border-color 0.2s;
  }
  .node.gold { border-color: rgba(212,175,55,0.4); }
  .node .n-num { font-size: 10px; font-weight: 900; color: #d4af37; letter-spacing: 1px; margin-bottom: 4px; }
  .node .n-text { font-size: 10.5px; font-weight: 400; color: #b8b098; line-height: 1.4; }

  /* setas entre nós — usamos SVG overlay */
  .arrows-svg {
    position: absolute; inset: 0;
    width: 620px; height: 620px;
    pointer-events: none;
  }

  /* legenda rodapé */
  .footer { margin-top: 40px; display: flex; align-items: center; gap: 10px; }
  .footer-line { width: 32px; height: 1px; background: #d4af37; opacity: 0.4; }
  .footer-text { font-size: 11px; color: #38362e; letter-spacing: 2px; text-transform: uppercase; }
</style>
</head>
<body>
<div class="canvas">
  <div class="title">O Loop Central</div>
  <div class="subtitle">Sistema Chave Mestra</div>

  <div class="orbit">
    <div class="orbit-ring"></div>
    <div class="orbit-ring-gold"></div>

    <!-- SVG arrows -->
    <svg class="arrows-svg" viewBox="0 0 620 620" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
          <path d="M0,0 L6,3 L0,6 Z" fill="rgba(212,175,55,0.5)"/>
        </marker>
      </defs>
      <!-- arco de seta circular (aproximado com arcos) -->
      <!-- Usamos um path circular grande com seta -->
      <path d="M 310 55 A 255 255 0 1 1 309 55" fill="none" stroke="rgba(212,175,55,0.18)" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr)"/>
    </svg>

    <!-- centro -->
    <div class="center-node">
      <div class="icon">⚡</div>
      <div class="label">O Sistema<br>Operando</div>
    </div>

    <!-- 6 nós posicionados em círculo, começando do topo, sentido horário -->
    <!-- pos: top=310-r*cos(θ), left=310+r*sin(θ), r=255 -->

    <!-- θ=270° topo: left=310, top=55 -->
    <div class="node gold" style="left:310px;top:55px;">
      <div class="n-num">01</div>
      <div class="n-text">Usa o sistema, produz melhor e mais rápido</div>
    </div>

    <!-- θ=330° (60° horário): left=310+255*sin60=531, top=310-255*cos60=182 -->
    <div class="node" style="left:531px;top:182px;">
      <div class="n-num">02</div>
      <div class="n-text">Audiência vê qualidade e cadência</div>
    </div>

    <!-- θ=30° (120°): left=310+255*sin120=531, top=310+255*cos60... -->
    <!-- sin(120)=0.866, cos(120)=-0.5 → left=531, top=438 -->
    <div class="node" style="left:531px;top:438px;">
      <div class="n-num">03</div>
      <div class="n-text">"Como você faz isso?" Pergunta e quer saber</div>
    </div>

    <!-- θ=180° fundo: left=310, top=565 -->
    <div class="node gold" style="left:310px;top:565px;">
      <div class="n-num">04</div>
      <div class="n-text">Compra o sistema</div>
    </div>

    <!-- θ=240° (esq-baixo): left=310-255*sin60=89, top=438 -->
    <div class="node" style="left:89px;top:438px;">
      <div class="n-num">05</div>
      <div class="n-text">Gera cases e resultados reais</div>
    </div>

    <!-- θ=300° (esq-cima): left=89, top=182 -->
    <div class="node" style="left:89px;top:182px;">
      <div class="n-num">06</div>
      <div class="n-text">Cases viram credibilidade e mais conteúdo</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-line"></div>
    <div class="footer-text">Chave Mestra</div>
    <div class="footer-line"></div>
  </div>
</div>
</body>
</html>
